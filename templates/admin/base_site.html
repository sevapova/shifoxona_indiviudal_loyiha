{% extends "admin/base.html" %}
{% load static %}

{% block title %}Shifoxona Boshqaruvi{% endblock %}

{% block extrastyle %}
{{ block.super }}
<style>
    :root {
        --primary: #ff80ab !important;
        --primary-fg: #fff !important;
        --header-bg: #f8bbd0 !important;
        --header-color: #880e4f !important;
        --breadcrumbs-bg: #fce4ec !important;
        --body-bg: #fff0f5 !important;
    }

    body, #content, #container {
        background-color: #fff0f5 !important;
    }

    #header {
        background: #f8bbd0 !important;
        color: #880e4f !important;
        border-bottom: 2px solid #f06292 !important;
    }

    #header a:link, #header a:visited {
        color: #880e4f !important;
        font-weight: bold;
    }

    /* TANLASH (FOCUS) HOLATIDA YASHIL RANG QILISH */
    input:focus, select:focus, textarea:focus {
        border: 2px solid #2ecc71 !important; /* Yashil chegara */
        box-shadow: 0 0 10px rgba(46, 204, 113, 0.4) !important; /* Yashil nurlanish */
        outline: none !important;
        background-color: #fafffa !important; /* Mayin yashil fon */
    }

    /* Shifokor va Kasallik selectlarini yanada aniqroq qilish */
    select {
        padding: 5px !important;
        border-radius: 5px !important;
        border: 1px solid #ccc !important;
        cursor: pointer;
    }

    div.breadcrumbs {
        background: #fce4ec !important;
        color: #ad1457 !important;
    }

    .module h2, .module caption, .inline-group h2 {
        background: #f06292 !important;
        color: #fff !important;
    }

    .button, input[type=submit], input[type=button], .submit-row input, a.button {
        background: #ec407a !important;
        border-radius: 8px !important;
        border: none !important;
    }

    /* Dashboard sarlavhasi */
    .dashboard #content h1 {
        font-size: 0;
    }
    .dashboard #content h1:before {
        content: "🏥 Shifoxona Boshqaruv Paneli";
        font-size: 24px;
        color: #880e4f;
    }
</style>
{% endblock %}

{% block branding %}
<h1 id="site-name"><a href="{% url 'admin:index' %}">🏥 SHIFOXONA</a></h1>
{% endblock %}

{% block nav-global %}{% endblock %}
